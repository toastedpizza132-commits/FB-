<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dodge Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background: linear-gradient(180deg, #111827, #030712);
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: #0f172a;
      border: 2px solid #334155;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .ui {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 900px);
      display: flex;
      justify-content: space-between;
      font-size: 20px;
      font-weight: bold;
      pointer-events: none;
      z-index: 2;
    }

    .centerScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      background: rgba(0,0,0,0.35);
    }

    .panel {
      background: rgba(15, 23, 42, 0.95);
      border: 2px solid #475569;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      width: min(90vw, 420px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .panel h1 {
      margin-bottom: 14px;
      font-size: 32px;
    }

    .panel p {
      margin: 8px 0;
      color: #cbd5e1;
      line-height: 1.5;
    }

    button {
      margin-top: 16px;
      padding: 12px 22px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
      transform: scale(1.04);
    }

    .mobile-controls {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 4;
    }

    .ctrl-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #64748b;
      background: rgba(30, 41, 59, 0.9);
      color: white;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    @media (min-width: 850px) {
      .mobile-controls {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Highscore: <span id="highscore">0</span></div>
  </div>

  <div class="centerScreen" id="startScreen">
    <div class="panel">
      <h1>Dodge Game</h1>
      <p>Bewege den blauen Spieler nach links und rechts.</p>
      <p>Weiche den roten Gegnern aus.</p>
      <p><b>Tastatur:</b> A/D oder Pfeiltasten</p>
      <p><b>Mobil:</b> die Buttons unten</p>
      <button id="startBtn">Spiel starten</button>
    </div>
  </div>

  <div class="centerScreen" id="gameOverScreen" style="display:none;">
    <div class="panel">
      <h1>Game Over</h1>
      <p>Dein Score: <span id="finalScore">0</span></p>
      <p>Drücke den Button für eine neue Runde.</p>
      <button id="restartBtn">Neustart</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="mobile-controls">
    <button class="ctrl-btn" id="leftBtn">◀</button>
    <button class="ctrl-btn" id="rightBtn">▶</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = Math.min(window.innerWidth * 0.95, 900);
      canvas.height = Math.min(window.innerHeight * 0.8, 600);
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const scoreEl = document.getElementById("score");
    const highscoreEl = document.getElementById("highscore");
    const finalScoreEl = document.getElementById("finalScore");

    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    let highscore = Number(localStorage.getItem("dodge_highscore")) || 0;
    highscoreEl.textContent = highscore;

    let gameRunning = false;
    let animationId = null;
    let score = 0;
    let spawnTimer = 0;
    let speedIncreaseTimer = 0;
    let enemySpeed = 3;

    const keys = {
      left: false,
      right: false
    };

    const player = {
      width: 48,
      height: 48,
      x: 0,
      y: 0,
      speed: 7,
      color: "#3b82f6"
    };

    let enemies = [];
    let particles = [];

    function resetGame() {
      score = 0;
      spawnTimer = 0;
      speedIncreaseTimer = 0;
      enemySpeed = 3;
      enemies = [];
      particles = [];

      player.x = canvas.width / 2 - player.width / 2;
      player.y = canvas.height - player.height - 20;

      scoreEl.textContent = score;
    }

    function spawnEnemy() {
      const size = 25 + Math.random() * 35;
      enemies.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        speed: enemySpeed + Math.random() * 2,
        color: "#ef4444"
      });
    }

    function spawnExplosion(x, y) {
      for (let i = 0; i < 18; i++) {
        particles.push({
          x,
          y,
          dx: (Math.random() - 0.5) * 8,
          dy: (Math.random() - 0.5) * 8,
          size: 3 + Math.random() * 5,
          life: 30 + Math.random() * 20
        });
      }
    }

    function update() {
      if (!gameRunning) return;

      if (keys.left) player.x -= player.speed;
      if (keys.right) player.x += player.speed;

      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }

      spawnTimer++;
      speedIncreaseTimer++;

      if (spawnTimer > 25) {
        spawnEnemy();
        spawnTimer = 0;
      }

      if (speedIncreaseTimer > 180) {
        enemySpeed += 0.3;
        speedIncreaseTimer = 0;
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.speed;

        if (checkCollision(player, e)) {
          spawnExplosion(player.x + player.width / 2, player.y + player.height / 2);
          endGame();
          return;
        }

        if (e.y > canvas.height) {
          enemies.splice(i, 1);
          score++;
          scoreEl.textContent = score;

          if (score > highscore) {
            highscore = score;
            localStorage.setItem("dodge_highscore", highscore);
            highscoreEl.textContent = highscore;
          }
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(255,255,255,0.05)";
      for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawPlayer() {
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.width, player.height);

      ctx.fillStyle = "#93c5fd";
      ctx.fillRect(player.x + 10, player.y + 8, 28, 10);

      ctx.fillStyle = "#dbeafe";
      ctx.fillRect(player.x + 6, player.y + 22, 8, 18);
      ctx.fillRect(player.x + 34, player.y + 22, 8, 18);
    }

    function drawEnemies() {
      for (const e of enemies) {
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x, e.y, e.width, e.height);

        ctx.fillStyle = "#fecaca";
        ctx.fillRect(e.x + e.width * 0.2, e.y + e.height * 0.2, e.width * 0.6, e.height * 0.15);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.fillStyle = `rgba(255, 200, 50, ${p.life / 50})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function draw() {
      drawBackground();
      drawPlayer();
      drawEnemies();
      drawParticles();
    }

    function gameLoop() {
      update();
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }

    function checkCollision(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function startGame() {
      startScreen.style.display = "none";
      gameOverScreen.style.display = "none";
      resetGame();
      gameRunning = true;

      if (animationId) cancelAnimationFrame(animationId);
      gameLoop();
    }

    function endGame() {
      gameRunning = false;
      finalScoreEl.textContent = score;
      gameOverScreen.style.display = "flex";
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.left = true;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.right = true;
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.left = false;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.right = false;
    });

    leftBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      keys.left = true;
    });
    leftBtn.addEventListener("touchend", (e) => {
      e.preventDefault();
      keys.left = false;
    });

    rightBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      keys.right = true;
    });
    rightBtn.addEventListener("touchend", (e) => {
      e.preventDefault();
      keys.right = false;
    });

    leftBtn.addEventListener("mousedown", () => keys.left = true);
    leftBtn.addEventListener("mouseup", () => keys.left = false);
    leftBtn.addEventListener("mouseleave", () => keys.left = false);

    rightBtn.addEventListener("mousedown", () => keys.right = true);
    rightBtn.addEventListener("mouseup", () => keys.right = false);
    rightBtn.addEventListener("mouseleave", () => keys.right = false);

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);

    resetGame();
    draw();
  </script>
</body>
</html>
